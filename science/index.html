<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>自然教學駕駛艙｜翰林版三下 全 4 單元</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--board:#1a2a1a;--board-light:#243524;--chalk:#e8e4d8;--chalk-dim:#a8a498;
  --yellow:#ffd54f;--wood:#8d6e4a;--wood-dark:#5d4530;--wood-light:#a8875a;
  --green:#a5d6a7;--blue:#81d4fa;--pink:#ff8a80;--orange:#ffb74d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:var(--board);
  color:var(--chalk);min-height:100vh}
header{background:linear-gradient(180deg,var(--wood-light) 0%,var(--wood) 40%,var(--wood-dark) 100%);
  padding:22px 28px 18px;box-shadow:0 4px 16px rgba(0,0,0,.5);border-bottom:3px solid #3a2a1a}
header h1{font-size:1.5rem;font-weight:900;text-shadow:1px 1px 3px rgba(0,0,0,.5)}
header .meta{font-size:.82rem;opacity:.85;margin-top:6px}
.badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:20px;padding:2px 10px;font-size:.72rem;margin-right:6px}
.container{max-width:900px;margin:0 auto;padding:40px 20px 80px}
h2{font-size:1.1rem;color:var(--yellow);margin-bottom:20px;padding-bottom:8px;
  border-bottom:2px dashed var(--yellow)}
.units{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.unit-card{background:var(--board-light);border:2px solid rgba(232,228,216,.2);
  border-radius:14px;padding:24px 22px;text-decoration:none;color:var(--chalk);display:block;
  transition:all .25s;box-shadow:inset 0 0 20px rgba(0,0,0,.3)}
.unit-card:hover{border-color:var(--yellow);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.unit-card .num{font-size:.75rem;color:var(--chalk-dim);margin-bottom:8px}
.unit-card .emoji{font-size:2.4rem;margin-bottom:10px;display:block}
.unit-card h3{font-size:1.25rem;font-weight:700;margin-bottom:8px}
.unit-card .theme{font-size:.82rem;color:var(--chalk-dim);margin-bottom:14px}
.unit-card .tags{display:flex;flex-wrap:wrap;gap:4px}
.tag-chip{background:rgba(165,214,167,.1);border:1px dashed var(--green);
  border-radius:6px;padding:2px 8px;font-size:.78rem;color:var(--green)}
.go-btn{display:inline-block;margin-top:16px;background:var(--yellow);color:#1a1a1a;
  border-radius:20px;padding:6px 18px;font-size:.82rem;font-weight:700}
</style>
</head>
<body>
<header>
  <h1>🔬 自然教學駕駛艙</h1>
  <div class="meta">
    <span class="badge">翰林版</span>
    <span class="badge">三年級下學期</span>
    <span class="badge">114學年度</span>
    全 4 單元
  </div>
</header>
<div class="container">
  <h2>🌱 選擇單元</h2>
  <div class="units">
    <a href="U1/index.html" class="unit-card">
      <div class="num">第 1 單元</div>
      <span class="emoji">🌱</span>
      <h3>快樂小農夫</h3>
      <div class="theme">蔬菜觀察・種植實作・成長日記</div>
      <div class="tags"><span class="tag-chip">間拔</span><span class="tag-chip">移植</span><span class="tag-chip">子葉</span><span class="tag-chip">本葉</span></div>
      <span class="go-btn">進入單元 →</span>
    </a>
    <a href="U2/index.html" class="unit-card">
      <div class="num">第 2 單元</div>
      <span class="emoji">💧</span>
      <h3>千變萬化的水</h3>
      <div class="theme">毛細現象・水的三態・三態變化</div>
      <div class="tags"><span class="tag-chip">毛細現象</span><span class="tag-chip">融化</span><span class="tag-chip">蒸發</span><span class="tag-chip">凝結</span></div>
      <span class="go-btn">進入單元 →</span>
    </a>
    <a href="U3/index.html" class="unit-card">
      <div class="num">第 3 單元</div>
      <span class="emoji">⛅</span>
      <h3>天氣停看聽</h3>
      <div class="theme">氣象觀測・氣溫變化・天氣預報</div>
      <div class="tags"><span class="tag-chip">氣溫</span><span class="tag-chip">雲量</span><span class="tag-chip">雨量筒</span><span class="tag-chip">風向</span></div>
      <span class="go-btn">進入單元 →</span>
    </a>
    <a href="U4/index.html" class="unit-card">
      <div class="num">第 4 單元</div>
      <span class="emoji">🐾</span>
      <h3>動物王國</h3>
      <div class="theme">動物構造・運動方式・生活環境</div>
      <div class="tags"><span class="tag-chip">飛行</span><span class="tag-chip">游泳</span><span class="tag-chip">爬行</span><span class="tag-chip">跳躍</span></div>
      <span class="go-btn">進入單元 →</span>
    </a>
  </div>
</div>
</body>
</html>
